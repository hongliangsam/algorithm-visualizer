<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>算法可视化器 - 重定向中</title>
  <script>
    // 检查当前URL
    const url = window.location.href;
    const baseUrl = 'https://hongliangsam.github.io/algorithm-visualizer/';

    // 如果不在正确的URL上，则重定向
    if (!url.startsWith(baseUrl)) {
      window.location.href = baseUrl;
    }
  </script>
</head>
<body>
  <h1>正在加载算法可视化器...</h1>
  <p>如果页面没有自动跳转，请<a href="https://hongliangsam.github.io/algorithm-visualizer/">点击这里</a>访问。</p>
</body>
</html>
